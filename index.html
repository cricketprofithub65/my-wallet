<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Wallet</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f3f4f6; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding-bottom: 65px; }
        .app-container { background: #fff; width: 100%; max-width: 400px; min-height: 100vh; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative; }
        
        .header { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; padding: 25px 20px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
        
        .balance-card { background: rgba(255, 255, 255, 0.15); border-radius: 12px; padding: 12px; margin-top: 15px; backdrop-filter: blur(5px); }
        .balance-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
        .balance-amount { font-size: 28px; font-weight: 700; margin-top: 2px; }
        
        .content-section { padding: 20px; display: none; flex-grow: 1; }
        .content-section.active { display: block; }
        
        .task-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .task-header { display: flex; justify-content: space-between; align-items: center; }
        .task-info h3 { font-size: 15px; font-weight: 600; color: #1f2937; }
        .task-info p { font-size: 13px; color: #10b981; font-weight: 600; margin-top: 2px; }
        
        .btn { border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; text-align: center; }
        .btn-primary { background: #4f46e5; color: #fff; }
        .btn-success { background: #10b981; color: #fff; width: 100%; padding: 12px; margin-top: 10px; font-size: 15px; border-radius: 10px; }
        .btn-secondary { background: #e5e7eb; color: #374151; width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 11px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; background: #ffffff; display: flex; border-top: 1px solid #e5e7eb; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: #6b7280; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-item span.icon { font-size: 18px; margin-bottom: 2px; }
        .nav-item.active { color: #4f46e5; background: #f9fafb; }

        .auth-container { padding: 30px 25px; display: flex; flex-direction: column; justify-content: center; min-height: 100vh; background: #fff; }
        .profile-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
        .profile-label { color: #6b7280; font-weight: 500; }
        .profile-value { color: #1f2937; font-weight: 600; }
        .statement-item { background: #fff; border: 1px solid #e5e7eb; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-screen" class="auth-container">
        <h2 style="margin-bottom: 20px; text-align: center; font-weight: 700; color: #1f2937;">Secure Wallet</h2>
        <form onsubmit="handleAuth(event)">
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="auth-mobile" placeholder="Enter mobile number" required>
            </div>
            <div class="form-group">
                <label>Secret PIN</label>
                <input type="password" id="auth-password" placeholder="Enter secret PIN" required>
            </div>
            <button type="submit" id="auth-submit-btn" class="btn btn-success">Login / Register</button>
        </form>
    </div>

    <div id="main-app" style="display: none;">
        <div class="header">
            <h1>Earn Wallet</h1>
            <div style="font-size: 13px; opacity: 0.9; margin-top: 3px; font-weight: 500;">Active Session: <span id="display-user" style="color: #facc15; font-weight: 700;">None</span></div>
            <div class="balance-card">
                <div class="balance-label">Your Balance</div>
                <div class="balance-amount"><span id="coin-balance">0</span> Coins</div>
            </div>
        </div>

        <div id="tasks-section" class="content-section active">
            <div class="task-card">
                <div class="task-header">
                    <div class="task-info">
                        <h3>Join Telegram Channel</h3>
                        <p style="color: #4f46e5;">+30 Coins</p>
                    </div>
                    <button id="tg-join-btn" onclick="claimTelegramCoins()" class="btn btn-primary">Join Now</button>
                </div>
            </div>
        </div>

        <div id="withdraw-section" class="content-section">
            <div class="task-card">
                <h3 style="font-size: 16px; margin-bottom: 15px; color: #1f2937;">Bank Settlement Panel</h3>
                <form onsubmit="handleWithdraw(event)">
                    <div class="form-group"><label>Account Holder Name</label><input type="text" id="bank-title" placeholder="As per bank passbook" required></div>
                    <div class="form-group"><label>Bank Name</label><input type="text" id="bank-name" placeholder="e.g. Bank of Baroda" required></div>
                    <div class="form-group"><label>Account Number</label><input type="text" id="account-number" placeholder="Enter account number" required></div>
                    <div class="form-group"><label>Branch IFSC Code</label><input type="text" id="ifsc-code" placeholder="Enter IFSC code" required></div>
                    <div class="form-group"><label>Coins to Redeem (Min 200)</label><input type="number" id="withdraw-amount" min="200" placeholder="Minimum 200" required></div>
                    <button type="submit" id="withdraw-submit-btn" class="btn btn-success">Submit Settlement</button>
                </form>
            </div>
        </div>

        <div id="profile-section" class="content-section">
            <div class="task-card">
                <h3 style="font-size: 16px; margin-bottom: 15px; color: #1f2937;">My Profile</h3>
                <div class="profile-row"><div class="profile-label">Registered Mobile</div><div class="profile-value" id="prof-mobile">0000000000</div></div>
                <div class="profile-row"><div class="profile-label">Account Status</div><div class="profile-value" style="color: #10b981;">Verified</div></div>
                
                <button class="btn btn-primary" onclick="toggleStatement()" style="width: 100%; margin-top: 15px; padding: 11px; background: #4f46e5;">📋 View Account Statement</button>
                <button class="btn btn-secondary" onclick="logout()" style="background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; width: 100%; margin-top: 15px;">Secure Sign Out</button>
            </div>

            <div class="task-card" id="statement-box" style="display: none; margin-top: 15px;">
                <h4 style="font-size: 14px; margin-bottom: 10px; color: #374151;">Your Withdrawal History</h4>
                <div id="statement-list" style="max-height: 250px; overflow-y: auto;"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="nav-tasks" onclick="switchTab('tasks')"><span class="icon">📋</span><div>Tasks</div></div>
            <div class="nav-item" id="nav-withdraw" onclick="switchTab('withdraw')"><span class="icon">🏦</span><div>Bank</div></div>
            <div class="nav-item" id="nav-profile" onclick="switchTab('profile')"><span class="icon">👤</span><div>Profile</div></div>
        </div>
    </div>
</div>

<script>
    // 📢 AAPKA NAYA LIVE SCRIPT URL AUTOMATICALLY INTEGRATED
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8gww_gl3cfQpeXHEn2z1sM92Cg2oa_Ezln2Ld9_uZVHw0NvMjbHsjvwjo8r_9E8YLLA/exec";
    let currentUser = localStorage.getItem('logged_in_user') || null;

    window.onload = function() {
        if(currentUser && currentUser !== "null" && currentUser !== "") { 
            showMainApp(); 
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }
    };

    function handleAuth(event) {
        event.preventDefault();
        const authBtn = document.getElementById('auth-submit-btn');
        const mobile = document.getElementById('auth-mobile').value.trim();
        const password = document.getElementById('auth-password').value.trim();
        
        authBtn.disabled = true;
        authBtn.innerText = "Connecting database...";

        // Explicit post body setup for register
        fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "register", mobile: mobile, password: password })
        })
        .then(() => {
            localStorage.setItem('logged_in_user', mobile);
            alert("Account Verified Successfully!");
            location.reload();
        })
        .catch(() => {
            // Safe local backup trigger
            localStorage.setItem('logged_in_user', mobile);
            location.reload();
        });
    }

    function showMainApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('display-user').innerText = currentUser;
        document.getElementById('prof-mobile').innerText = currentUser;
        updateLiveBalance();
    }

    function updateLiveBalance() {
        fetch(`${GOOGLE_SCRIPT_URL}?mobile=${currentUser}&action=getBalance`)
        .then(res => res.json())
        .then(res => {
            document.getElementById('coin-balance').innerText = res.balance;
        })
        .catch(() => {
            document.getElementById('coin-balance').innerText = "0";
        });
    }

    function switchTab(tabName) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(tabName + '-section').classList.add('active');
        document.querySelectorAll('.bottom-nav .nav-item').forEach(item => item.classList.remove('active'));
        document.getElementById('nav-' + tabName).classList.add('active');
    }

    function toggleStatement() {
        const box = document.getElementById('statement-box');
        const listContainer = document.getElementById('statement-list');

        if(box.style.display === 'block') {
            box.style.display = 'none';
        } else {
            box.style.display = 'block';
            listContainer.innerHTML = '<p style="font-size:12px;text-align:center;padding:10px;color:#6b7280;">Fetching records...</p>';
            
            fetch(`${GOOGLE_SCRIPT_URL}?mobile=${currentUser}`)
            .then(res => res.json())
            .then(history => {
                listContainer.innerHTML = '';
                if(!history || history.length === 0) {
                    listContainer.innerHTML = '<p style="font-size:12px;text-align:center;padding:10px;color:#9ca3af;">No withdrawals yet.</p>';
                    return;
                }

                // Reverse sequence display mapping loop
                history.reverse().forEach(tx => {
                    let statusText = tx.status ? String(tx.status).trim() : "Pending";
                    let statusColor = "#f59e0b"; // Yellow
                    
                    if(statusText.toLowerCase() === "success") {
                        statusColor = "#10b981"; // Green
                    } else if(statusText.toLowerCase() === "reject" || statusText.toLowerCase() === "rejected") {
                        statusColor = "#ef4444"; // Red
                    }

                    let cleanAcc = tx.accountNumber ? String(tx.accountNumber).slice(-4) : "0000";

                    listContainer.innerHTML += `
                        <div class="statement-item" style="border: 1px solid #e5e7eb; padding: 12px; border-radius: 8px; margin-bottom: 10px; background:#fff;">
                            <div style="display:flex; justify-content:space-between; font-weight:bold;">
                                <span style="color:#ef4444;">-${tx.amount} Coins</span>
                                <span style="color:#6b7280; font-size:11px;">${tx.date ? tx.date.split(',')[0] : ''}</span>
                            </div>
                            <div style="font-size:11px; color:#4b5563; margin-top:4px;">Bank: ${tx.bankName || 'Bank'} (****${cleanAcc})</div>
                            <div style="font-size:11px; color:${statusColor}; font-weight:700; margin-top:2px; text-transform:uppercase;">Status: ${statusText}</div>
                        </div>
                    `;
                });
                
                // CRITICAL AUTO-SYNC LOGIC: Jaise hi statements load honge, balance automatic sheet se fresh refresh ho jayega!
                updateLiveBalance();
            });
        }
    }

    function handleWithdraw(event) {
        event.preventDefault();
        const submitBtn = document.getElementById('withdraw-submit-btn');
        const amount = parseInt(document.getElementById('withdraw-amount').value);
        const currentBal = parseInt(document.getElementById('coin-balance').innerText) || 0;

        if(currentBal < amount) return alert("Insufficient balance in your wallet!");

        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting to sheet...";

        const payload = {
            action: "withdraw",
            mobile: currentUser,
            bankTitle: document.getElementById('bank-title').value.trim(),
            bankName: document.getElementById('bank-name').value.trim(),
            accountNumber: document.getElementById('account-number').value.trim(),
            ifscCode: document.getElementById('ifsc-code').value.trim(),
            amount: amount
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            let newBal = currentBal - amount;
            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "updateBalance", mobile: currentUser, newBalance: newBal })
            }).then(() => {
                alert("Settlement Logged Successfully!");
                location.reload();
            });
        });
    }

    function claimTelegramCoins() {
        window.open("https://t.me/+DekQ2nzaz6FjZDZl", "_blank");
        
        let currentBal = parseInt(document.getElementById('coin-balance').innerText) || 0;
        let newBal = currentBal + 30;

        fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "updateBalance", mobile: currentUser, newBalance: newBal })
        }).then(() => {
            alert("🎉 +30 Coins successfully added to your wallet!");
            location.reload();
        });
    }

    function logout() {
        localStorage.removeItem('logged_in_user');
        location.reload();
    }
</script>
</body>
</html>
