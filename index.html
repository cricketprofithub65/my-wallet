<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Earn Wallet</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f3f4f6; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 0; padding-bottom: 65px; }
        .app-container { background: #fff; width: 100%; max-width: 400px; min-height: 100vh; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative; }
        
        .header { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; padding: 25px 20px; text-align: center; position: relative; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
        
        .balance-card { background: rgba(255, 255, 255, 0.15); border-radius: 12px; padding: 12px; margin-top: 15px; backdrop-filter: blur(5px); }
        .balance-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
        .balance-amount { font-size: 28px; font-weight: 700; margin-top: 2px; }
        
        .content-section { padding: 20px; display: none; flex-grow: 1; }
        .content-section.active { display: block; }
        
        .task-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .task-info h3 { font-size: 15px; font-weight: 600; color: #1f2937; }
        .task-info p { font-size: 13px; color: #10b981; font-weight: 600; margin-top: 2px; }
        
        .btn { border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; text-align: center; }
        .btn-primary { background: #4f46e5; color: #fff; }
        .btn-success { background: #10b981; color: #fff; width: 100%; padding: 12px; margin-top: 10px; font-size: 15px; border-radius: 10px; }
        .btn-secondary { background: #e5e7eb; color: #374151; width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 11px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; background: #ffffff; display: flex; border-top: 1px solid #e5e7eb; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: #6b7280; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-item span.icon { font-size: 18px; margin-bottom: 2px; }
        .nav-item.active { color: #4f46e5; background: #f9fafb; }

        .auth-container { padding: 30px 25px; display: flex; flex-direction: column; justify-content: center; min-height: 100vh; background: #fff; }
        
        /* Games Styling */
        .game-pitch { width: 100%; height: 260px; background: #4caf50; border-radius: 12px; margin-top: 10px; position: relative; overflow: hidden; display: none; border: 3px solid #2e7d32; box-shadow: inset 0 0 40px rgba(0,0,0,0.3); cursor: pointer; }
        .cricket-crease { position: absolute; bottom: 40px; left: 10%; width: 80%; height: 4px; background: rgba(255,255,255,0.7); }
        .bowling-machine { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 35px; height: 35px; background: #374151; border-radius: 6px; border: 2px solid #9ca3af; text-align: center; color: white; font-size: 9px; font-weight: bold; line-height: 30px; }
        .stumps-container { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 5; transition: transform 0.2s; }
        .stump { width: 4px; height: 32px; background: #f59e0b; border-radius: 2px; }
        .batsman-container { position: absolute; bottom: 12px; left: 38%; width: 50px; height: 60px; z-index: 10; }
        .batsman-body { width: 8px; height: 25px; background: #1e3a8a; margin: 0 auto; border-radius: 4px; position: relative; }
        .batsman-head { width: 12px; height: 12px; background: #ffedd5; border-radius: 50%; position: absolute; top: -14px; left: -2px; border: 1px solid #1e3a8a; }
        .batsman-bat { width: 4px; height: 28px; background: #b45309; position: absolute; bottom: 2px; left: -8px; transform-origin: top center; transform: rotate(20deg); transition: transform 0.12s ease-out; border-radius: 1px; }
        .batsman-container.swinging .batsman-bat { transform: rotate(-110deg) scaleY(1.1); background: #ef4444; }
        .live-ball { width: 14px; height: 14px; background: #dc2626; border: 1.5px solid #fff; border-radius: 50%; position: absolute; top: 30px; left: 50%; transform: translateX(-50%) scale(0.5); display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.4); z-index: 15; }
        
        .football-pitch { width: 100%; height: 220px; background: #2e7d32; border-radius: 12px; margin-top: 10px; position: relative; overflow: hidden; display: none; border: 3px solid #1b5e20; box-shadow: inset 0 0 30px rgba(0,0,0,0.4); }
        .goalpost { width: 80%; height: 80px; border: 4px solid #fff; border-bottom: none; position: absolute; top: 15px; left: 10%; background: rgba(255,255,255,0.1); border-radius: 4px 4px 0 0; }
        .goalkeeper { width: 30px; height: 30px; background: #ff9800; border-radius: 50%; position: absolute; top: 55px; left: 50%; transform: translateX(-50%); transition: left 0.35s ease-in-out; border: 2px solid #fff; text-align: center; font-size: 14px; line-height: 26px; z-index: 10; }
        .soccer-ball { width: 22px; height: 22px; background: #fff; border: 2px solid #000; border-radius: 50%; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 12; box-shadow: 0 4px 5px rgba(0,0,0,0.3); pointer-events: none; }
        
        .shoot-target { position: absolute; top: 25px; width: 45px; height: 25px; background: rgba(239, 68, 68, 0.8); border: 2px dashed #fff; border-radius: 4px; color: #fff; font-size: 9px; font-weight: 700; text-align: center; line-height: 21px; cursor: pointer; z-index: 20; transition: transform 0.1s; }
        .shoot-target:active { transform: scale(0.9); }
        .target-left { left: 15%; }
        .target-center { left: 50%; transform: translateX(-50%); }
        .target-right { right: 15%; }
